<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>lojaIsabel - Login</title>
	<link rel="stylesheet" href="/style/styles.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700&display=swap">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
	<div class="container">
		<div class="content first-content">
			<div class="first-column">
				<div class="logo-area">
					<img src="/assets/logo.webp" alt="Logo da Loja" class="logo-img" onerror="this.style.display='none'" />
				</div>
			</div>
			<div class="second-column">
				<h2 class="title title-second">Login</h2>
				<form class="form" id="loginForm">
					<label class="label-input">
						<i class="far fa-envelope icon-modify"></i>
						<input type="email" id="loginEmail" placeholder="E-mail" required autocomplete="username">
					</label>
					<label class="label-input">
						<i class="fas fa-lock icon-modify"></i>
						<input type="password" id="loginPassword" placeholder="Senha" required autocomplete="current-password">
					</label>
					<button type="submit" class="btn btn-second">Entrar</button>
				</form>
			</div>
		</div>
	</div>
			<script type="module" src="/js/app.js"></script>
</body>
</html>
