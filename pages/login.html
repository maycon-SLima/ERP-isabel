<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>lojaIsabel - Login</title>
	<link rel="stylesheet" href="../css/styles.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700&display=swap">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
	<div class="container">
		<div class="content first-content">
			<div class="first-column">
				<div class="logo-area">
					<img src="../assets/logo.webp" alt="Logo da Loja" class="logo-img" onerror="this.style.display='none'" />
				</div>
			</div>
			<div class="login-box-simple">
				<span class="logo logo-simple">nomeLoja</span>
				<h2 class="login-title">Bem-vindo(a) de volta</h2>
				<p class="login-desc">Continue colocando os dados da sua conta.</p>
				<form class="login-form-simple" id="loginForm">
					<label for="loginEmail" class="login-label">E-mail</label>
					<div class="input-wrapper">
						<i class="fa-regular fa-envelope"></i>
						<input type="email" id="loginEmail" class="login-input" placeholder="seuemail@email.com" required autocomplete="username">
					</div>
					<label for="loginPassword" class="login-label">Senha</label>
					<div class="input-wrapper">
						<i class="fa-solid fa-lock"></i>
						<input type="password" id="loginPassword" class="login-input" placeholder="************" required autocomplete="current-password">
					</div>
					<button type="submit" class="login-btn">Entrar na plataforma</button>
				</form>
			</div>
		</div>
	</div>
			<script type="module" src="../js/app.js"></script>
</body>
</html>
